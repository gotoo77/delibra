<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Delibra{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ url_for('home') }}">Delibra</a>
      <nav aria-label="Primary">
        <a href="{{ url_for('new_run') }}">New run</a>
        <a href="{{ url_for('runs') }}">Runs</a>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
