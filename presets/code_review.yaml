id: code_review
version: 0.1.0
description: Structured code review protocol.

roles:
  framer:
    name: Framer
    instruction: Restate the change scope, affected behavior, and missing context.
  maintainer:
    name: Maintainer
    instruction: Review maintainability, consistency, readability, and integration risk.
  tester:
    name: Tester
    instruction: Review test coverage, regression risk, and observable behavior.
  security:
    name: Security Reviewer
    instruction: Review security, privacy, input handling, and abuse risks.
  critic:
    name: Critic
    instruction: Challenge the reviews for missed risks, weak assumptions, and overstatements.
  synthesizer:
    name: Synthesizer
    instruction: Produce a concise final review with prioritized findings and residual risk.

steps:
  - id: frame
    kind: prompt
    role: framer
    roles: null
    instruction: Frame the submitted change.
    inputs:
      - user_input
    produces:
      output: framing
      kind: framing
  - id: role_reviews
    kind: fanout
    role: null
    roles:
      - maintainer
      - tester
      - security
    instruction: Review the framed change from your role.
    inputs:
      - framing
    produces:
      output: reviews
      kind: review
  - id: critique_reviews
    kind: criticize
    role: null
    roles:
      - critic
      - maintainer
    instruction: Critique the reviews and identify missing or weak points.
    inputs:
      - framing
      - reviews
    produces:
      output: critiques
      kind: critique
  - id: final
    kind: synthesize
    role: synthesizer
    roles: null
    instruction: Synthesize the framing, reviews, and critiques into the final review.
    inputs:
      - framing
      - reviews
      - critiques
    produces:
      output: final_synthesis
      kind: synthesis
